window.프로필업로드 = async function () {

document.getElementById("profileUpload").files[0];

}

const {
data:{user}
}
=await supabase.auth.getUser();

=
await supabase.storage
.from("profile-images")
.upload(fileName,file,{
upsert:true
});

}

const {data:urlData}
=

.from("profile-images")
.getPublicUrl(fileName);

=
await supabase
.from("users")
.update({
profile_image:imageUrl
})
.eq("user_id",user.id);

if(updateError){
alert(updateError.message);
return;
}

alert("프로필 변경 완료");

location.reload();
