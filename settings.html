window.프로필업로드 = async function () {

const file =
document.getElementById("profileUpload").files[0];

if(!file){
alert("사진을 선택하세요.");
return;
}

const {
data:{user}
}
=await supabase.auth.getUser();

if(!user){
alert("로그인 필요");
return;
}

const fileName =
user.id+"."+file.name.split(".").pop();

const {error:uploadError}
=
await supabase.storage
.from("profile-images")
.upload(fileName,file,{
upsert:true
});

if(uploadError){
alert(uploadError.message);
return;
}

const {data:urlData}
=
supabase.storage
.from("profile-images")
.getPublicUrl(fileName);

const imageUrl=
urlData.publicUrl;

const {error:updateError}
=
await supabase
.from("users")
.update({
profile_image:imageUrl
})
.eq("user_id",user.id);

if(updateError){
alert(updateError.message);
return;
}

alert("프로필 변경 완료");

location.reload();

}
</script>
