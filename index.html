<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://scttowfhygcpdirrekqm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjdHRvd2ZoeWdjcGRpcnJla3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTg0MjYsImV4cCI6MjA5NTc3NDQyNn0.XwdQhJ4Ku_C61yXz0k65AztMF9Rfe7Qzn3Av7iWRBqY"
);

window.addEventListener("DOMContentLoaded", async () => {

  const 레벨이름 = {
    1: "일반",
    2: "프리미엄",
    3: "돌프리미엄",
    4: "돌돌프리미엄",
    5: "돌돌돌프리미엄",
    6: "돌돌돌돌프리미엄",
    7: "돌돌돌돌돌프리미엄",
    8: "유사돌이",
    9: "돌이",
    10: "관리자"
  };

  const 사진 = document.getElementById("돌이사진");
  const 로그인버튼 = document.getElementById("로그인");
  const 회원가입버튼 = document.getElementById("회원가입");
  const 로그아웃버튼 = document.getElementById("로그아웃");
  const 돌돌코인버튼 = document.getElementById("돌돌코인");
  const 메뉴 = document.getElementById("메뉴");
  const 메뉴2 = document.getElementById("메뉴2");
  const 레벨버튼 = document.getElementById("레벨");
  const 돌돌코인수량 = document.getElementById("돌돌코인수량");

  let 상세설명 = false;

  // 세션 확인
  const {
    data: { session }
  } = await supabase.auth.getSession();

  if (!session) {

    로그인버튼.style.display = "block";
    회원가입버튼.style.display = "block";

    로그인버튼.onclick = () => {
      location.href = "login.html";
    };

    회원가입버튼.onclick = () => {
      location.href = "signin.html";
    };

    return;
  }

  // 로그인 유저
  const {
    data: { user }
  } = await supabase.auth.getUser();

  if (!user) return;

  // users 테이블 조회
  const { data: 유저정보, error: userError } = await supabase
    .from("users")
    .select("user_number, user_level, doldolcoin")
    .eq("user_id", user.id)
    .single();

  if (userError) {
    console.error("유저 조회 오류:", userError);
    return;
  }

  const 유저번호 = 유저정보.user_number;

  // 프로필 사진 표시
  사진.style.display = "block";

  // 초기 레벨
  레벨버튼.textContent =
    `현재 레벨: ${레벨이름[유저정보.user_level] || "일반"}`;

  // 초기 코인
  돌돌코인수량.textContent =
    `현재 돌돌코인 수량: ${유저정보.doldolcoin ?? 0}`;

  사진.onclick = async () => {

    상세설명 = !상세설명;

    로그아웃버튼.style.display = 상세설명 ? "block" : "none";
    돌돌코인버튼.style.display = 상세설명 ? "block" : "none";
    메뉴.style.display = 상세설명 ? "block" : "none";
    메뉴2.style.display = 상세설명 ? "block" : "none";
    레벨버튼.style.display = 상세설명 ? "block" : "none";
    돌돌코인수량.style.display = 상세설명 ? "block" : "none";

    if (!상세설명) return;

    const { data, error } = await supabase
      .from("users")
      .select("user_level, doldolcoin")
      .eq("user_number", 유저번호)
      .single();

    if (error) {
      console.error(error);
      return;
    }

    레벨버튼.textContent =
      `현재 레벨: ${레벨이름[data.user_level] || "일반"}`;

    돌돌코인수량.textContent =
      `현재 돌돌코인 수량: ${data.doldolcoin ?? 0}`;
  };

  로그아웃버튼.onclick = async () => {
    await supabase.auth.signOut();
    location.href = "index.html";
  };

  돌돌코인버튼.onclick = () => {
    location.href = "doldolcoinshop.html";
  };

});
</script>
