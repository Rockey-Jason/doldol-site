window.회원가입 = async function () {

  const name =
    document.getElementById("name").value;

  const login_id =
    document.getElementById("id").value;

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  if (
    name.trim() === "" ||
    login_id.trim() === "" ||
    email.trim() === "" ||
    password.trim() === ""
  ) {
    alert("모든 정보를 입력하세요.");
    return;
  }

  if (password.length < 7) {
    alert("비밀번호는 7자 이상이어야 합니다.");
    return;
  }
  const email = document.getElementById("email").value.trim();
  console.log(email);
  if (!email.includes("@")) {
  alert("이메일을 정확히 입력하세요.");
  return;
}

  const { data: authData, error: authError } =
  await supabase.auth.signUp({
    email: email,
    password: password,
    options: {
      emailRedirectTo:
        "https://rockey-jason.github.io/doldol-site/login.html",

     data: {
  name: name,
  user_id: login_id
}
    }
  });

  if (authError) {
    alert(
      "회원가입 실패: " +
      authError.message
    );
    console.error(authError);
    return;
  }

  alert(
    "인증 이메일이 발송되었습니다. 이메일의 '이메일 인증하기' 버튼을 눌러 회원가입을 완료하세요."
  );

};
</script>
