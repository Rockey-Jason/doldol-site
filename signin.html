window.회원가입 = async function () {

  let name = document.getElementById("name").value;
  let user_id = document.getElementById("id").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if (
    name.trim() === "" ||
    user_id.trim() === "" ||
    email.trim() === "" ||
    password.length < 7
  ) {
    alert("입력값 확인");
    return;
  }

  const { data: authData, error: authError } =
  await supabase.auth.signUp({
    email: email,
    password: password,
  });

if (authError) {
  alert("회원가입 실패: " + authError.message);
  return;
}

  const { error } = await supabase
    .from("users")
    .insert([
      {
        name: name,
        user_id: user_id,
        email: email,
        password: password,
        doldolcoin: 0,
        read_dori_news: 0,
        containing_item: ""
      }
    ]);

  if (error) {
    alert("회원가입 실패: " + error.message);
    console.log(error);
  } else {
    localStorage.setItem("로그인상태", "true");
    localStorage.setItem("id", user_id);
    alert("인증 이메일이 발송되었습니다. 이메일의 링크를 눌러 계정을 활성화하세요.");
  }
};
