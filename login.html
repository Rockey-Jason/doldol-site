<script type=module>
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://scttowfhygcpdirrekqm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjdHRvd2ZoeWdjcGRpcnJla3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTg0MjYsImV4cCI6MjA5NTc3NDQyNn0.XwdQhJ4Ku_C61yXz0k65AztMF9Rfe7Qzn3Av7iWRBqY"
);
window.로그인 = async function () {

  const name = document.getElementById("name").value.trim();
  const loginId = document.getElementById("id").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  if (!name || !loginId || !email || !password) {
    alert("모든 정보를 입력하세요.");
    return;
  }

  let 틀린항목 = [];

  // 이메일 조회
  const { data: userInfo } = await supabase
    .from("users")
    .select("*")
    .eq("email", email)
    .maybeSingle();
  
console.log("입력한 이메일:", email);
console.log("찾은 사용자:", userInfo);
  
  // 이메일이 틀리면 나머지는 비교 불가
  if (!userInfo) {
    alert("❌ 이메일이 틀렸습니다.");
    return;
  }

  // 이름 확인
  if (userInfo.name !== name) {
    틀린항목.push("계정 이름");
  }

  // 아이디 확인
  if (userInfo.login_id !== loginId) {
    틀린항목.push("아이디");
  }

  // 비밀번호 확인
  const { error: authError } =
    await supabase.auth.signInWithPassword({
      email,
      password
    });

  if (authError) {
    틀린항목.push("비밀번호");
  }

  // 틀린 것이 있으면 모두 출력
  if (틀린항목.length > 0) {
    alert("❌ 틀린 항목: " + 틀린항목.join(", "));
    return;
  }

  alert("로그인 성공!");
  location.href = "https://rockey-jason.github.io/doldol-site/";
};

</script>
